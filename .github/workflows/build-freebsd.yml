name: Build for FreeBSD

on:
  workflow_dispatch:

jobs:
  build:
    name: Build FreeBSD Binary
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 编译前端页面
        env:
          CI: false 
        run: |
          cd web        
          npm install --legacy-peer-deps
          npm run build 

      - name: 配置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' 

      - name: 下载后端依赖
        run: go mod download

      - name: 交叉编译 FreeBSD/amd64 版本
        env:
          GOOS: freebsd
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags "-s -w" -o new-api-freebsd-amd64 .
          
      - name: 上传编译好的文件
        uses: actions/upload-artifact@v4
        with:
          name: new-api-freebsd
          path: new-api-freebsd-amd64
