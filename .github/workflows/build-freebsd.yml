name: Build for FreeBSD

on:
  workflow_dispatch:

jobs:
  build:
    name: Build FreeBSD Binary
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 替换后的前端构建逻辑
      - name: 配置 Node.js 和 Bun 环境
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 编译前端页面
        env:
          CI: false 
        run: |
          cd web        
          bun install
          bun run build 

      - name: 配置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # 建议升级到 1.22，对新特性支持更好

      - name: 下载后端依赖
        run: go mod download

      - name: 交叉编译 FreeBSD/amd64 版本
        env:
          GOOS: freebsd
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags "-s -w" -o new-api-freebsd-amd64 .
          
      - name: 上传编译好的文件
        uses: actions/upload-artifact@v4
        with:
          name: new-api-freebsd
          path: new-api-freebsd-amd64
