name: Build for FreeBSD

on:
  workflow_dispatch:

jobs:
  build:
    name: Build FreeBSD Binary
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # ================= 新增：编译前端 =================
      - name: 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '18' # 推荐使用 Node 18 或 20

      - name: 编译前端页面 (生成 web/dist)
        env:
          CI: false # 防止前端代码有 warning 时被视为 error 导致中断
        run: |
          cd web        # 进入前端目录
          npm install   # 安装前端依赖
          npm run build # 打包前端页面
      # =================================================

      - name: 配置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: 下载后端依赖
        run: go mod download

      - name: 交叉编译 FreeBSD/amd64 版本
        env:
          GOOS: freebsd
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags "-s -w" -o new-api-freebsd-amd64 .
          
      - name: 上传编译好的文件
        uses: actions/upload-artifact@v4
        with:
          name: new-api-freebsd
          path: new-api-freebsd-amd64
